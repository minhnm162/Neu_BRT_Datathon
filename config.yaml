paths:
  dataset: "dataset"
  outputs: "outputs"
  figures: "outputs/figures"
  models: "outputs/models"
  cv_results: "outputs/cv_results"
  submissions: "outputs/submissions"
  report_figures: "report/figures"

seed: 42

# Train/test split theo de bai
train_start: "2012-07-04"
train_end:   "2022-12-31"
test_start:  "2023-01-01"
test_end:    "2024-07-01"

# Validation folds (expanding window)
cv_folds:
  - {train_end: "2018-12-31", val_start: "2019-01-01", val_end: "2019-12-31"}
  - {train_end: "2019-12-31", val_start: "2020-01-01", val_end: "2020-12-31"}
  - {train_end: "2020-12-31", val_start: "2021-01-01", val_end: "2021-12-31"}
  - {train_end: "2021-06-30", val_start: "2021-07-01", val_end: "2021-12-31"}
  - {train_end: "2021-12-31", val_start: "2022-01-01", val_end: "2022-12-31"}

# Feature config
lag_days: [1, 2, 3, 7, 14, 21, 28, 30, 60, 90, 180, 365]
rolling_windows: [7, 14, 28, 56, 90, 180]
ewm_spans: [7, 14, 30, 90]
fourier_weekly_k: 3
fourier_yearly_k: 10

# Ensemble metric weights
composite_weights:
  mae: 0.4
  rmse: 0.4
  r2_neg: 0.2   # (1 - R2), minimize

# LightGBM hyperparams (khoi diem, Optuna se refine)
lgbm_base:
  n_estimators: 2000
  learning_rate: 0.03
  max_depth: 6
  num_leaves: 63
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  reg_alpha: 0.1
  reg_lambda: 1.0
  early_stopping_rounds: 100
  verbose: -1

# Hue colors cho plot
colors:
  primary:   "#2ecc71"
  secondary: "#3498db"
  accent:    "#e74c3c"
  neutral:   "#95a5a6"
  highlight: "#f39c12"
